<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #8382d2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            line-height: 1.2;
            font-weight: bold;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            padding: 15px 20px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            outline: none;
            color: #333;
        }

        input::placeholder {
            color: #999;
        }

        .predict-btn {
            background: linear-gradient(to right, #ff5f00, #ff0055);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .predict-btn:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
            font-size: 1.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Performance Predictor</h1>

    <form action="/predict" method="post">
        <input type="number" step="0.1" name="study" placeholder="Study Hours" value="{{ study }}" required>
        <input type="number" step="0.1" name="attendance" placeholder="Attendance %" value="{{ attendance }}" required>
        <input type="number" step="0.1" name="marks" placeholder="Previous Marks" value="{{ marks }}" required>
        
        <button type="submit" class="predict-btn">Predict</button>
    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}
</div>

</body>
</html>
